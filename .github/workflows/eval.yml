name: RAG Evaluation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  evaluate:
    name: RAGAS quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install PyTorch (CPU-only)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild BM25 index from cached chunks
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: |
          python -m src.ingestion.edgar_fetcher --tickers AAPL MSFT --filing-type 10-K --limit 1
          python -m src.ingestion.parser --tickers AAPL MSFT
          python -m src.ingestion.chunker --tickers AAPL MSFT
          python -m src.indexing.vector_store --tickers AAPL MSFT
          python -m src.indexing.bm25_index

      - name: Run RAGAS evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: |
          python -m src.evaluation.ragas_eval --limit 4 --source curated

      # ragas_eval.py exits with code 1 if any metric is below threshold.
      # GitHub Actions fails the PR automatically on non-zero exit.
